<form class="w-full space-y-md">

<input class="w-full h-tap-target-min bg-surface-container-lowest border border-outline-variant rounded-lg px-md font-body-md text-on-surface placeholder:text-outline transition-all" id="email" placeholder="name@company.com" type="email"/>
</div>

</div>
<div class="relative">

<button class="absolute right-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]" data-icon="visibility" type="button">visibility</button>
</div>
</div>
