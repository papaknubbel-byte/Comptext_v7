name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check src/ tests/ api.py config.py

      - name: Run tests
        run: pytest tests/ --tb=short -q

      - name: Coverage report
        run: pytest tests/ --cov=src --cov-report=term-missing -q

  react-build:
    name: React frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: showcase/package-lock.json
      - name: Install frontend deps
        run: cd showcase && npm ci
      - name: Build React app
        run: cd showcase && npm run build

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [test, react-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t comptext-daimler:ci .
