version: "3.9"

services:
  frontend:
    build:
      context: ./showcase
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - api

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - LLM_BACKEND=ollama_gemma
      - OLLAMA_URL=http://ollama:11434
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    depends_on:
      - ollama

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  ollama_data:
  n8n_data:
